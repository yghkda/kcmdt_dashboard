name: Schedule Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Report trigger details
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          echo "event_name=$EVENT_NAME"
          echo "schedule=$SCHEDULE"
          echo "utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          TZ=Asia/Seoul date '+kst=%Y-%m-%d %H:%M:%S KST'
